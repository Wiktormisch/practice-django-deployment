services:
  web:
    build: .
    command: gunicorn blog.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
